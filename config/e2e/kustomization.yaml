# E2E test overlay - uses fm-crd-system namespace and enables webhooks
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Override namespace to fm-crd-system for E2E tests
namespace: fm-crd-system

resources:
- ../default

# Override image for E2E tests with locally loaded image
images:
- name: fleet-management-operator
  newName: example.com/fm-crd
  newTag: v1.0.0

patches:
# Enable webhook CA injection for E2E tests with cert-manager
- path: webhookcainjection_patch.yaml
# Set imagePullPolicy to Never for locally loaded images in Kind
- path: manager_image_pull_patch.yaml
  target:
    kind: Deployment
    name: fm-crd-controller-manager
