  name: vexternalattributesync.kb.io
  rules:
  - apiGroups:
    - fleetmanagement.grafana.com
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - externalattributesyncs
  sideEffects: None
  timeoutSeconds: 5
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-fleetmanagement-grafana-com-v1alpha1-pipeline
  failurePolicy: Fail
  name: vpipeline.kb.io
  rules:
  - apiGroups:
    - fleetmanagement.grafana.com
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - pipelines
  sideEffects: None
  timeoutSeconds: 5
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
