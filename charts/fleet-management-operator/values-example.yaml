# Example values file for Fleet Management Operator
# Copy this file and customize for your environment

image:
  # Update with your container registry
  repository: ghcr.io/YOUR_USERNAME/fleet-management-operator
  tag: v0.1.0
  pullPolicy: IfNotPresent

# Fleet Management API Configuration
# REQUIRED: Configure these with your Grafana Cloud credentials
fleetManagement:
  # Replace with your Fleet Management cluster URL
  baseUrl: "https://fleet-management-prod-us-central-0.grafana.net/pipeline.v1.PipelineService/"

  # Replace with your Grafana Cloud Stack ID
  username: "12345"

  # Replace with your Grafana Cloud API Token
  # Create token at: https://grafana.com/orgs/<your-org>/api-keys
  password: "glc_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

# Resource Configuration
resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

# Enable metrics and Prometheus integration
metrics:
  enabled: true
  service:
    serviceMonitor:
      # Set to true if using Prometheus Operator
      enabled: false
      interval: 30s
      additionalLabels:
        prometheus: kube-prometheus

# Leader Election (recommended for HA)
leaderElection:
  enabled: true

# Per-controller opt-in. New controllers default to disabled so existing
# chart installs see no behavior change. Flip a toggle to true to enable
# that controller, its admission webhook, and its RBAC.
#
# Note: enabling controllers.collector also grants get/list/watch on
# RemoteAttributePolicy and ExternalAttributeSync so the Collector
# reconciler can compute the merged desired-attribute set — even when
# those other controllers are themselves disabled.
#
# Note: controllers.collectorDiscovery.enabled=true requires
# controllers.collector.enabled=true. The manager refuses to start
# otherwise — discovery without the Collector reconciler creates CRs
# that no controller acts on.
controllers:
  pipeline:
    enabled: true                # existing behavior, default on
  collector:
    enabled: false               # manage collector remote attributes
  remoteAttributePolicy:
    enabled: false               # bulk attribute assignment by selector
  externalAttributeSync:
    enabled: false               # HTTP/SQL-backed scheduled attribute pulls
  collectorDiscovery:
    enabled: false               # auto-mirror Fleet collectors as Collector CRs

