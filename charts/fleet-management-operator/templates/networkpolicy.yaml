{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "fleet-management-operator.fullname" . }}
  labels:
    {{- include "fleet-management-operator.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "fleet-management-operator.selectorLabels" . | nindent 6 }}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  {{- if and (include "fleet-management-operator.webhooksEnabled" .) .Values.networkPolicy.ingress.webhook.enabled }}
  - ports:
    - protocol: TCP
      port: {{ .Values.webhook.port }}
    {{- with .Values.networkPolicy.ingress.webhook.from }}
    from:
      {{- toYaml . | nindent 6 }}
    {{- end }}
  {{- end }}
  {{- if and .Values.metrics.enabled .Values.networkPolicy.ingress.metrics.enabled }}
  - ports:
    - protocol: TCP
      port: {{ .Values.metrics.port }}
    {{- with .Values.networkPolicy.ingress.metrics.from }}
    from:
      {{- toYaml . | nindent 6 }}
    {{- end }}
  {{- end }}
  {{- with .Values.networkPolicy.ingress.extra }}
    {{- toYaml . | nindent 2 }}
  {{- end }}
  egress:
  {{- if .Values.networkPolicy.egress.dns.enabled }}
  - ports:
    {{- toYaml .Values.networkPolicy.egress.dns.ports | nindent 4 }}
    {{- with .Values.networkPolicy.egress.dns.to }}
    to:
      {{- toYaml . | nindent 6 }}
    {{- end }}
  {{- end }}
  {{- if .Values.networkPolicy.egress.kubeAPI.enabled }}
  - ports:
    {{- toYaml .Values.networkPolicy.egress.kubeAPI.ports | nindent 4 }}
    {{- with .Values.networkPolicy.egress.kubeAPI.to }}
    to:
      {{- toYaml . | nindent 6 }}
    {{- end }}
  {{- end }}
  {{- if .Values.networkPolicy.egress.fleetAPI.enabled }}
  - ports:
    {{- toYaml .Values.networkPolicy.egress.fleetAPI.ports | nindent 4 }}
    {{- with .Values.networkPolicy.egress.fleetAPI.to }}
    to:
      {{- toYaml . | nindent 6 }}
    {{- end }}
  {{- end }}
  {{- with .Values.networkPolicy.egress.externalSources }}
    {{- toYaml . | nindent 2 }}
  {{- end }}
  {{- with .Values.networkPolicy.egress.extra }}
    {{- toYaml . | nindent 2 }}
  {{- end }}
{{- end }}
