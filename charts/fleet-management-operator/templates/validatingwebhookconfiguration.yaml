apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ include "fleet-management-operator.fullname" . }}-validating-webhook
  labels:
    {{- include "fleet-management-operator.labels" . | nindent 4 }}
  {{- if .Values.webhook.certManager.enabled }}
  annotations:
    cert-manager.io/inject-ca-from: "{{ .Release.Namespace }}/{{ include "fleet-management-operator.fullname" . }}-webhook"
  {{- end }}
webhooks:
{{- if .Values.controllers.collector.enabled }}
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: {{ include "fleet-management-operator.fullname" . }}-webhook
      namespace: {{ .Release.Namespace }}
      path: /validate-fleetmanagement-grafana-com-v1alpha1-collector
  failurePolicy: Fail
  name: vcollector.kb.io
  timeoutSeconds: 5
  rules:
  - apiGroups:
    - fleetmanagement.grafana.com
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - collectors
  sideEffects: None
{{- end }}
{{- if .Values.controllers.collectorDiscovery.enabled }}
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: {{ include "fleet-management-operator.fullname" . }}-webhook
      namespace: {{ .Release.Namespace }}
      path: /validate-fleetmanagement-grafana-com-v1alpha1-collectordiscovery
  failurePolicy: Fail
  name: vcollectordiscovery.kb.io
  timeoutSeconds: 5
  rules:
  - apiGroups:
    - fleetmanagement.grafana.com
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - collectordiscoveries
  sideEffects: None
{{- end }}
{{- if .Values.controllers.externalAttributeSync.enabled }}
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: {{ include "fleet-management-operator.fullname" . }}-webhook
      namespace: {{ .Release.Namespace }}
      path: /validate-fleetmanagement-grafana-com-v1alpha1-externalattributesync
  failurePolicy: Fail
  name: vexternalattributesync.kb.io
  timeoutSeconds: 5
  rules:
  - apiGroups:
    - fleetmanagement.grafana.com
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - externalattributesyncs
  sideEffects: None
{{- end }}
{{- if .Values.controllers.pipeline.enabled }}
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: {{ include "fleet-management-operator.fullname" . }}-webhook
      namespace: {{ .Release.Namespace }}
      path: /validate-fleetmanagement-grafana-com-v1alpha1-pipeline
  failurePolicy: Fail
  name: vpipeline.kb.io
  timeoutSeconds: 5
  rules:
  - apiGroups:
    - fleetmanagement.grafana.com
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - pipelines
  sideEffects: None
{{- end }}
{{- if .Values.controllers.remoteAttributePolicy.enabled }}
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: {{ include "fleet-management-operator.fullname" . }}-webhook
      namespace: {{ .Release.Namespace }}
      path: /validate-fleetmanagement-grafana-com-v1alpha1-remoteattributepolicy
  failurePolicy: Fail
  name: vremoteattributepolicy.kb.io
  timeoutSeconds: 5
  rules:
  - apiGroups:
    - fleetmanagement.grafana.com
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - remoteattributepolicies
  sideEffects: None
{{- end }}
{{- if .Values.controllers.tenantPolicy.enabled }}
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: {{ include "fleet-management-operator.fullname" . }}-webhook
      namespace: {{ .Release.Namespace }}
      path: /validate-fleetmanagement-grafana-com-v1alpha1-tenantpolicy
  failurePolicy: Fail
  name: vtenantpolicy.kb.io
  timeoutSeconds: 5
  rules:
  - apiGroups:
    - fleetmanagement.grafana.com
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - tenantpolicies
  sideEffects: None
{{- end }}
