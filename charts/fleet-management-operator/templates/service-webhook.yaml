{{- if or .Values.controllers.pipeline.enabled .Values.controllers.collector.enabled .Values.controllers.collectorDiscovery.enabled .Values.controllers.externalAttributeSync.enabled .Values.controllers.remoteAttributePolicy.enabled .Values.controllers.tenantPolicy.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "fleet-management-operator.fullname" . }}-webhook
  labels:
    {{- include "fleet-management-operator.labels" . | nindent 4 }}
spec:
  ports:
  - name: webhook
    port: 443
    targetPort: {{ .Values.webhook.port }}
    protocol: TCP
  selector:
    {{- include "fleet-management-operator.selectorLabels" . | nindent 4 }}
{{- end }}
