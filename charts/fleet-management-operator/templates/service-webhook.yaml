apiVersion: v1
kind: Service
metadata:
  name: {{ include "fleet-management-operator.fullname" . }}-webhook
  labels:
    {{- include "fleet-management-operator.labels" . | nindent 4 }}
spec:
  ports:
  - name: webhook
    port: 443
    targetPort: 9443
    protocol: TCP
  selector:
    {{- include "fleet-management-operator.selectorLabels" . | nindent 4 }}
