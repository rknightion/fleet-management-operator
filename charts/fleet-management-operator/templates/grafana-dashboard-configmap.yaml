{{- if .Values.grafana.dashboards.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "fleet-management-operator.fullname" . }}-dashboard
  labels:
    {{- include "fleet-management-operator.labels" . | nindent 4 }}
    grafana_dashboard: "1"
data:
  fleet-management-operator.json: |
    {{- .Files.Get "dashboards/fleet-management-operator.json" | nindent 4 }}
{{- end }}
