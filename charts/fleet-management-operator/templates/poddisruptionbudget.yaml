{{/*
PDB only renders when replicaCount > 1. At replicaCount=1, a PDB with
minAvailable=1 (or maxUnavailable=0) blocks node drains: there is no
second pod to satisfy the budget, so eviction is denied indefinitely.
HA installs (replicaCount >= 2) get the PDB; single-replica installs
do not, regardless of podDisruptionBudget.enabled.
*/}}
{{- if and .Values.podDisruptionBudget.enabled (gt (int .Values.replicaCount) 1) }}
{{- if and .Values.podDisruptionBudget.minAvailable .Values.podDisruptionBudget.maxUnavailable }}
{{- fail "podDisruptionBudget.minAvailable and podDisruptionBudget.maxUnavailable are mutually exclusive — set exactly one" }}
{{- end }}
{{- if not (or .Values.podDisruptionBudget.minAvailable .Values.podDisruptionBudget.maxUnavailable) }}
{{- fail "podDisruptionBudget.enabled=true with replicaCount > 1 requires one of podDisruptionBudget.minAvailable or podDisruptionBudget.maxUnavailable" }}
{{- end }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "fleet-management-operator.fullname" . }}
  labels:
    {{- include "fleet-management-operator.labels" . | nindent 4 }}
spec:
  {{- if .Values.podDisruptionBudget.minAvailable }}
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
  {{- end }}
  {{- if .Values.podDisruptionBudget.maxUnavailable }}
  maxUnavailable: {{ .Values.podDisruptionBudget.maxUnavailable }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "fleet-management-operator.selectorLabels" . | nindent 6 }}
{{- end }}
