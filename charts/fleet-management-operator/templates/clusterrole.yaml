{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "fleet-management-operator.fullname" . }}-manager-role
  labels:
    {{- include "fleet-management-operator.labels" . | nindent 4 }}
rules:
{{- if .Values.controllers.pipeline.enabled }}
- apiGroups:
  - fleetmanagement.grafana.com
  resources:
  - pipelines
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - fleetmanagement.grafana.com
  resources:
  - pipelines/finalizers
  verbs:
  - update
- apiGroups:
  - fleetmanagement.grafana.com
  resources:
  - pipelines/status
  verbs:
  - get
  - patch
  - update
{{- end }}
{{- if .Values.controllers.collector.enabled }}
- apiGroups:
  - fleetmanagement.grafana.com
  resources:
  - collectors
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - fleetmanagement.grafana.com
  resources:
  - collectors/finalizers
  verbs:
  - update
- apiGroups:
  - fleetmanagement.grafana.com
  resources:
  - collectors/status
  verbs:
  - get
  - patch
  - update
# The Collector reconciler reads RemoteAttributePolicy and
# ExternalAttributeSync resources to compute the merged desired attribute
# set. Granted whenever the collector controller is enabled, regardless of
# which other controllers are.
- apiGroups:
  - fleetmanagement.grafana.com
  resources:
  - remoteattributepolicies
  - externalattributesyncs
  verbs:
  - get
  - list
  - watch
{{- end }}
{{- if .Values.controllers.remoteAttributePolicy.enabled }}
- apiGroups:
  - fleetmanagement.grafana.com
  resources:
  - remoteattributepolicies
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - fleetmanagement.grafana.com
  resources:
  - remoteattributepolicies/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - fleetmanagement.grafana.com
  resources:
  - collectors
  verbs:
  - get
  - list
  - watch
{{- end }}
{{- if .Values.controllers.externalAttributeSync.enabled }}
- apiGroups:
  - fleetmanagement.grafana.com
  resources:
  - externalattributesyncs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - fleetmanagement.grafana.com
  resources:
  - externalattributesyncs/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - fleetmanagement.grafana.com
  resources:
  - collectors
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
{{- end }}
{{- if .Values.controllers.collectorDiscovery.enabled }}
- apiGroups:
  - fleetmanagement.grafana.com
  resources:
  - collectordiscoveries
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - fleetmanagement.grafana.com
  resources:
  - collectordiscoveries/status
  verbs:
  - get
  - patch
  - update
# Discovery creates and deletes Collector CRs. Read verbs are already
# granted by the collector controller (which discovery requires), but we
# add them here too so the chart's clusterrole is self-contained for
# any future split.
- apiGroups:
  - fleetmanagement.grafana.com
  resources:
  - collectors
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
{{- end }}
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
{{- end }}
