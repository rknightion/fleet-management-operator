{{/*
Mutually-exclusive cert configuration guard. Setting both modes is a
silent misconfiguration today (cert-manager mounts win, certDir is
ignored), so fail-fast on render to surface the conflict.
*/}}
{{- if and .Values.webhook.certManager.enabled .Values.webhook.certDir }}
{{- fail "webhook.certManager.enabled and webhook.certDir are mutually exclusive — set exactly one" }}
{{- end }}
{{/*
certDir mode requires a pre-existing Secret to source tls.crt and tls.key
from. Without it the manager would CrashLoopBackOff trying to read TLS
material from an unmounted path.
*/}}
{{- if and .Values.webhook.certDir (not .Values.webhook.certSecretName) }}
{{- fail "webhook.certDir is set but webhook.certSecretName is empty — set webhook.certSecretName to the name of a Secret containing tls.crt and tls.key, or use webhook.certManager.enabled instead" }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fleet-management-operator.fullname" . }}
  labels:
    {{- include "fleet-management-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: {{ .Values.updateStrategy.type | default "RollingUpdate" }}
    {{- if eq (.Values.updateStrategy.type | default "RollingUpdate") "RollingUpdate" }}
    rollingUpdate:
      maxUnavailable: {{ .Values.updateStrategy.rollingUpdate.maxUnavailable | default 0 }}
      maxSurge: {{ .Values.updateStrategy.rollingUpdate.maxSurge | default 1 }}
    {{- end }}
  selector:
    matchLabels:
      {{- include "fleet-management-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
        {{- if not .Values.fleetManagement.existingSecret }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "fleet-management-operator.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "fleet-management-operator.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- if and .Values.image.digest (contains "@" .Values.image.repository) }}
      {{- fail "image.digest is set but image.repository already contains a digest (image.repository must not contain '@' when image.digest is set)" }}
      {{- end }}
      containers:
      - name: manager
        image: "{{ .Values.image.repository }}{{ if .Values.image.digest }}@{{ .Values.image.digest }}{{ else }}:{{ .Values.image.tag | default .Chart.AppVersion }}{{ end }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: health
          containerPort: {{ .Values.healthProbe.port }}
          protocol: TCP
        - name: metrics
          containerPort: {{ .Values.metrics.port }}
          protocol: TCP
        - name: webhook
          containerPort: {{ .Values.webhook.port }}
          protocol: TCP
        command:
        - /manager
        args:
        {{- if .Values.leaderElection.enabled }}
        - --leader-elect
        - --leader-election-lease-duration={{ .Values.leaderElection.leaseDuration }}
        - --leader-election-renew-deadline={{ .Values.leaderElection.renewDeadline }}
        - --leader-election-retry-period={{ .Values.leaderElection.retryPeriod }}
        {{- end }}
        - --health-probe-bind-address=:{{ .Values.healthProbe.port }}
        - --zap-log-level={{ .Values.logging.level }}
        - --webhook-port={{ .Values.webhook.port }}
        - --enable-pipeline-controller={{ .Values.controllers.pipeline.enabled }}
        - --enable-collector-controller={{ .Values.controllers.collector.enabled }}
        - --enable-policy-controller={{ .Values.controllers.remoteAttributePolicy.enabled }}
        - --enable-external-sync-controller={{ .Values.controllers.externalAttributeSync.enabled }}
        - --enable-collector-discovery-controller={{ .Values.controllers.collectorDiscovery.enabled }}
        - --enable-tenant-policy-enforcement={{ .Values.controllers.tenantPolicy.enabled }}
        - --fleet-api-rps={{ .Values.fleetManagement.apiRatePerSecond }}
        - --fleet-api-burst={{ .Values.fleetManagement.apiRateBurst }}
        - --controller-policy-max-concurrent={{ .Values.controllers.remoteAttributePolicy.maxConcurrent }}
        - --controller-sync-max-concurrent={{ .Values.controllers.externalAttributeSync.maxConcurrent }}
        - --controller-sync-target-rate={{ .Values.controllers.externalAttributeSync.sourceTargetRate }}
        - --controller-sync-target-burst={{ .Values.controllers.externalAttributeSync.sourceTargetBurst }}
        - --controller-discovery-max-concurrent={{ .Values.controllers.collectorDiscovery.maxConcurrent }}
        {{- if .Values.metrics.enabled }}
        - --metrics-bind-address=:{{ .Values.metrics.port }}
        {{- else }}
        - --metrics-bind-address=0
        {{- end }}
        - --metrics-secure={{ .Values.metrics.secure }}
        - --enable-http2={{ .Values.enableHTTP2 }}
        {{- if .Values.webhook.certManager.enabled }}
        - --webhook-cert-path=/tmp/k8s-webhook-server/serving-certs
        {{- else if .Values.webhook.certDir }}
        - --webhook-cert-path={{ .Values.webhook.certDir }}
        {{- end }}
        {{- if or .Values.webhook.certManager.enabled .Values.webhook.certDir }}
        - --webhook-cert-name={{ .Values.webhook.certName }}
        - --webhook-cert-key={{ .Values.webhook.certKey }}
        {{- end }}
        env:
        - name: FLEET_MANAGEMENT_BASE_URL
          valueFrom:
            secretKeyRef:
              name: {{ include "fleet-management-operator.secretName" . }}
              key: {{ .Values.fleetManagement.existingSecretKeys.baseUrl }}
        - name: FLEET_MANAGEMENT_USERNAME
          valueFrom:
            secretKeyRef:
              name: {{ include "fleet-management-operator.secretName" . }}
              key: {{ .Values.fleetManagement.existingSecretKeys.username }}
        - name: FLEET_MANAGEMENT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "fleet-management-operator.secretName" . }}
              key: {{ .Values.fleetManagement.existingSecretKeys.password }}
        {{- with .Values.securityContext }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        {{- if .Values.webhook.certManager.enabled }}
        - name: webhook-certs
          mountPath: /tmp/k8s-webhook-server/serving-certs
          readOnly: true
        {{- else if .Values.webhook.certDir }}
        - name: webhook-certs
          mountPath: {{ .Values.webhook.certDir }}
          readOnly: true
        {{- end }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: {{ .Values.healthProbe.port }}
          initialDelaySeconds: {{ .Values.healthProbe.liveness.initialDelaySeconds }}
          periodSeconds: {{ .Values.healthProbe.liveness.periodSeconds }}
          timeoutSeconds: {{ .Values.healthProbe.liveness.timeoutSeconds }}
          failureThreshold: {{ .Values.healthProbe.liveness.failureThreshold }}
        readinessProbe:
          httpGet:
            path: /readyz
            port: {{ .Values.healthProbe.port }}
          initialDelaySeconds: {{ .Values.healthProbe.readiness.initialDelaySeconds }}
          periodSeconds: {{ .Values.healthProbe.readiness.periodSeconds }}
          timeoutSeconds: {{ .Values.healthProbe.readiness.timeoutSeconds }}
          failureThreshold: {{ .Values.healthProbe.readiness.failureThreshold }}
        {{- with .Values.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.affinity }}
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}
      {{- else if gt (int .Values.replicaCount) 1 }}
      {{/*
      Auto-injected soft pod anti-affinity for HA installs (replicaCount > 1).
      Spreads replicas across nodes by hostname so a single node failure does
      not take down both leader and standby. Soft (preferred) so single-node
      clusters and capacity-constrained schedulers can still place pods.
      Override by setting `affinity` explicitly in values.yaml.
      */}}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  {{- include "fleet-management-operator.selectorLabels" . | nindent 18 }}
              topologyKey: kubernetes.io/hostname
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      volumes:
      - name: tmp
        emptyDir: {}
      {{- if .Values.webhook.certManager.enabled }}
      - name: webhook-certs
        secret:
          secretName: {{ include "fleet-management-operator.fullname" . }}-webhook-certs
          defaultMode: 0444
      {{- else if .Values.webhook.certDir }}
      - name: webhook-certs
        secret:
          secretName: {{ .Values.webhook.certSecretName }}
          defaultMode: 0444
      {{- end }}
