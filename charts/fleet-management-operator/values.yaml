# fleet-management-operator Helm chart values
#
# Controller model: each controller is independently opt-in.
# - controllers.pipeline.enabled (default: true) — core pipeline reconciler
# - controllers.collector/remoteAttributePolicy/externalAttributeSync/collectorDiscovery
#   (default: false) — attribute-management controllers
# - controllers.tenantPolicy (default: false) — K8s-RBAC-based tenancy enforcement
#
# For configuration reference see CLAUDE.md and the individual controller sections below.
#
# Default values for fleet-management-operator

# Image configuration.
#
# Two reference styles are supported. Pick exactly one:
#   1. Tag-based (default; suitable for dev / non-production):
#        image.repository: <registry>/<image>
#        image.tag: <tag>
#   2. Digest-pinned (recommended for production / supply-chain hardening):
#        image.repository: <registry>/<image>
#        image.digest: sha256:<hex>      # overrides tag
#        image.tag: ""                   # ignored when digest is set
#
# Do NOT embed a digest inside image.repository (e.g. "...@sha256:..."). The
# chart will fail-fast on render if image.digest is set AND image.repository
# already contains "@", to surface the conflict early.
image:
  repository: fleet-management-operator
  pullPolicy: IfNotPresent
  tag: "dev-v1.0.0"
  # digest: ""  # When set, overrides tag. Use sha256:<hex>.

# Image pull secrets for private / air-gapped registries.
imagePullSecrets: []
# - name: regcred

# Override the chart name
nameOverride: ""
fullnameOverride: ""

# Number of operator replicas (only 1 should be active due to leader election)
replicaCount: 1

# Fleet Management API credentials
# These can be provided via values or existingSecret
fleetManagement:
  # Base URL for Fleet Management API
  # Example: https://fleet-management-prod-us-central-0.grafana.net/pipeline.v1.PipelineService/
  baseUrl: ""

  # Grafana Cloud Stack ID
  username: ""

  # Grafana Cloud API token
  password: ""

  # Use existing secret instead of creating one
  # If set, baseUrl, username, and password are ignored
  existingSecret: ""

  # Keys in the existing secret
  existingSecretKeys:
    baseUrl: base-url
    username: username
    password: password

  # Rate-limiter configuration.
  # apiRatePerSecond: match to your Fleet Management server-side api: rate
  # setting. Standard stacks default to 3; large or custom deployments may
  # allow more. Increase only if your Fleet Management stack is configured
  # with a higher limit — exceeding the server-side limit will produce 429s.
  # apiRateBurst: burst tokens available at startup/restart before the
  # sustained RPS ceiling applies. burst=1 causes livelock at scale (request
  # queue backs up until requests hit the 30s HTTP timeout).
  apiRatePerSecond: 3
  apiRateBurst: 50

# Service Account configuration
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # automount: false — operator uses in-cluster kubeconfig via controller-runtime;
  # mounting the SA token unnecessarily expands the blast radius of a container compromise.
  automount: false
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# Pod annotations
podAnnotations: {}

# Pod labels
podLabels: {}

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  fsGroup: 65532     # align with container UID; ensures mounted Secrets are readable
  seccompProfile:
    type: RuntimeDefault

# Container security context
securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  runAsUser: 65532
  runAsGroup: 65532
  capabilities:
    drop:
    - "ALL"

# Resource limits and requests.
# Sizing guidance (informer cache + Pipeline cache + Go runtime headroom):
#   <1k CRs: limits.memory 512Mi
#   10k CRs: limits.memory 1Gi
#   30k+ CRs: limits.memory 2Gi (default below — covers the 30k tier with
#            burst headroom for restarts, GC pause spikes, and large
#            ListCollectors responses)
# requests.memory stays at 512Mi: steady-state working set after warm-up.
resources:
  limits:
    cpu: 500m
    memory: 2Gi
  requests:
    cpu: 10m
    memory: 512Mi

# Logging configuration
logging:
  # Log level passed to --zap-log-level: debug, info, warn, error
  # Production default: info (JSON encoding, no stacktraces below error).
  # debug enables console encoding with stacktraces on warn+ — very verbose at 30k scale.
  level: info

# Termination grace period in seconds. Must exceed the Fleet API HTTP client timeout (30s)
# so in-flight API calls can complete before the pod is forcibly killed. Do not reduce below 30.
terminationGracePeriodSeconds: 30

# Leader election configuration
leaderElection:
  enabled: true
  # Lease duration
  leaseDuration: 15s
  # Renew deadline
  renewDeadline: 10s
  # Retry period
  retryPeriod: 2s

# Health probe configuration
healthProbe:
  # Port for health probes
  port: 8081
  # Liveness probe configuration
  liveness:
    # 45s accounts for informer cache warm-up at 30k Collectors (15-45s on a busy API server).
    # A shorter delay risks false crash-loops during normal startup.
    initialDelaySeconds: 45
    periodSeconds: 20
    timeoutSeconds: 1
    failureThreshold: 3
  # Readiness probe configuration
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 1
    failureThreshold: 3

# Metrics configuration
metrics:
  # Enable metrics endpoint
  enabled: true
  # Port for metrics
  port: 8080
  # secure: serve the metrics endpoint over HTTPS. Default false (HTTP) for easy
  # Prometheus scraping inside the cluster without TLS cert plumbing.
  # Set true only if you provide TLS certs for the metrics endpoint.
  secure: false
  # Service for metrics
  service:
    # Service type
    type: ClusterIP
    # Service port
    port: 8080
    # Service annotations
    annotations: {}
    # ServiceMonitor for Prometheus Operator
    serviceMonitor:
      enabled: false
      # Additional labels for ServiceMonitor
      additionalLabels: {}
      # Scrape interval
      interval: 30s
      # Scrape timeout
      scrapeTimeout: 10s

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity rules
affinity: {}
# Example anti-affinity to spread replicas across nodes (for replicaCount > 1):
# affinity:
#   podAntiAffinity:
#     preferredDuringSchedulingIgnoredDuringExecution:
#     - weight: 100
#       podAffinityTerm:
#         labelSelector:
#           matchLabels:
#             app.kubernetes.io/name: fleet-management-operator
#         topologyKey: kubernetes.io/hostname

# Priority class name
priorityClassName: ""

# Pod disruption budget
podDisruptionBudget:
  enabled: false
  # WARNING: Do NOT enable with minAvailable: 1 when replicaCount: 1 — it will block node drains.
  # When enabling PDB for HA (replicaCount > 1), prefer maxUnavailable: 1 over minAvailable.
  minAvailable: 1
  # maxUnavailable: 1  # Recommended over minAvailable for graceful rolling updates

# RBAC configuration
rbac:
  # Specifies whether RBAC resources should be created
  create: true

# Webhook TLS configuration.
# See docs/webhook-setup.md for cert-manager, manual, and self-signed strategies.
# Default: controller-runtime auto-generates self-signed certs (dev/test only).
# Production: enable cert-manager or provide manual certs to avoid cert mismatch on restart.
webhook:
  # Port the webhook server listens on. Must match service-webhook.yaml targetPort.
  port: 9443
  # cert-manager managed certificates (recommended for production HA).
  # Requires cert-manager to be installed in the cluster.
  certManager:
    enabled: false
    # Reference to a cert-manager Issuer or ClusterIssuer.
    # Create this Issuer/ClusterIssuer before enabling.
    issuerRef:
      name: selfsigned-issuer
      kind: ClusterIssuer
  # Directory containing webhook TLS cert files (tls.crt, tls.key).
  # When set, passed as --webhook-cert-path to the manager.
  # Leave empty to use controller-runtime's auto-generated self-signed certs.
  certDir: ""

# Controllers and webhooks are individually opt-in. New controllers default to
# disabled so existing chart installs see no behavior change. Flip the
# matching key to true to enable that controller, its webhook, and its RBAC.
controllers:
  # Pipeline reconciler. Existing behavior, default on.
  pipeline:
    enabled: true
  # Collector reconciler. Manages remote attributes on a registered collector.
  collector:
    enabled: false
  # RemoteAttributePolicy reconciler. Bulk attribute assignment by selector.
  # Reserved for a later phase; present here for forward-compatible values.
  remoteAttributePolicy:
    enabled: false
    # Max concurrent reconciles. Safe to increase: reconciles are pure K8s
    # cache reads with no Fleet API calls. Pipeline and Collector always run
    # at 1 because they share the Fleet API rate budget.
    maxConcurrent: 4
  # ExternalAttributeSync reconciler. Pulls attributes from CMDB / SQL / HTTP
  # sources on a schedule. Reserved for a later phase.
  externalAttributeSync:
    enabled: false
    # Max concurrent reconciles. Safe to increase: Fetch calls are per-source.
    maxConcurrent: 4
    # Per-target rate limit (tokens/sec). Two syncs that resolve to the same
    # upstream (HTTP host or SQL secret) share a token bucket so a restart
    # wave or batched spec edit cannot stampede a customer-owned source.
    # 0 (default) disables per-target limiting; the operator controller-runtime
    # workqueue and the reconciler's MaxConcurrentReconciles still apply.
    # Set to 1 for one fetch/sec/upstream — typically plenty since sync
    # schedules run every minute or longer.
    sourceTargetRate: 0
    # Token bucket size for the per-target limiter. Ignored when
    # sourceTargetRate is 0. Default 4 = matches maxConcurrent so a single
    # concurrency generation passes through immediately.
    sourceTargetBurst: 4
  # CollectorDiscovery reconciler. Periodically calls Fleet Management's
  # ListCollectors and mirrors each result as a Collector CR. Requires
  # controllers.collector.enabled=true (the manager startup will refuse
  # to run otherwise — discovery without the Collector reconciler would
  # create CRs that nobody acts on).
  collectorDiscovery:
    # REQUIRES controllers.collector.enabled: true.
    # The manager will refuse to start if collectorDiscovery is enabled without collector —
    # discovery creates Collector CRs that nobody reconciles without the Collector controller.
    enabled: false
    # Keep at 1: concurrency > 1 triggers multiple ListCollectors per poll cycle.
    maxConcurrent: 1
  # TenantPolicy enforcement. When enabled, the validating webhooks for
  # Pipeline, RemoteAttributePolicy, and ExternalAttributeSync require K8s
  # subjects matched by a TenantPolicy CR to include at least one of the
  # policy's required matchers in their CR matcher set. Default-allow when
  # no policy matches the request, so existing installs see no behavior
  # change until at least one TenantPolicy is created. Cluster-scoped CRD;
  # standard K8s RBAC controls who can create/edit policies.
  tenantPolicy:
    enabled: false

# Grafana dashboard ConfigMap. Picked up automatically by the Grafana sidecar
# (label grafana_dashboard: "1") or the Grafana Dashboard Operator.
grafana:
  dashboards:
    enabled: false

# Prometheus alert rules. Requires Prometheus Operator CRDs (PrometheusRule).
alerts:
  enabled: false
  # Labels added to the PrometheusRule resource for Prometheus Operator label selectors.
  # Example: prometheus: kube-prometheus
  labels: {}

# CRD lifecycle is governed by Helm 3 conventions, not chart values:
#   * On install/upgrade, every YAML in the chart's crds/ directory is applied
#     once. Helm does NOT re-apply or update CRDs on subsequent upgrades.
#   * On uninstall, Helm does NOT delete CRDs (intentional, to preserve user
#     CRs across reinstalls). To remove CRDs, run kubectl delete crd ... by
#     hand. See README "Uninstalling the Chart" for the exact commands.
# This chart therefore does not expose crds.install / crds.keep — they would
# have no effect.

