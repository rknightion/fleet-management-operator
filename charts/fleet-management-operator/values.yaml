# fleet-management-operator Helm chart values
#
# Controller model: each controller is independently opt-in.
# - controllers.pipeline.enabled (default: true) — core pipeline reconciler
# - controllers.collector/remoteAttributePolicy/externalAttributeSync/collectorDiscovery
#   (default: false) — attribute-management controllers
# - controllers.tenantPolicy (default: false) — K8s-RBAC-based tenancy enforcement
#
# For configuration reference see CLAUDE.md and the individual controller sections below.
#
# Default values for fleet-management-operator

# Image configuration.
#
# Two reference styles are supported. Pick exactly one:
#   1. Tag-based (default; suitable for dev / non-production):
#        image.repository: <registry>/<image>
#        image.tag: <tag>
#   2. Digest-pinned (recommended for production / supply-chain hardening):
#        image.repository: <registry>/<image>
#        image.digest: sha256:<hex>      # overrides tag
#        image.tag: ""                   # ignored when digest is set
#
# Do NOT embed a digest inside image.repository (e.g. "...@sha256:..."). The
# chart will fail-fast on render if image.digest is set AND image.repository
# already contains "@", to surface the conflict early.
image:
  # -- Container image repository.
  repository: ghcr.io/rknightion/fleet-management-operator
  # -- Image pull policy.
  pullPolicy: IfNotPresent
  # -- Image tag. Ignored when `image.digest` is set.
  tag: "dev"
  # -- (string) Image digest pin (e.g. `sha256:<hex>`). Recommended for production.
  # digest: ""

# -- Image pull secrets for private / air-gapped registries.
imagePullSecrets: []
# - name: regcred

# -- Override the chart name (defaults to "fleet-management-operator").
nameOverride: ""
# -- Override the chart fullname (defaults to "<release-name>-fleet-management-operator").
fullnameOverride: ""

# -- Number of operator replicas. Only one is active at a time via leader election.
# Set > 1 for HA — also see `podDisruptionBudget` and `affinity.podAntiAffinity`.
# At replicaCount > 1 with empty `affinity`, the chart auto-injects a soft pod
# anti-affinity (hostname topology) so replicas spread across nodes.
replicaCount: 1

# Deployment update strategy. Default RollingUpdate with maxUnavailable=0 and
# maxSurge=1 keeps at least one pod Ready throughout a rollout. With
# `webhook.failurePolicy=Fail` (chart default), this avoids an admission outage
# window where every old pod has terminated before the new one becomes Ready.
updateStrategy:
  # -- Deployment strategy type. RollingUpdate (default) or Recreate.
  type: RollingUpdate
  rollingUpdate:
    # -- Max pods unavailable during a rollout. 0 keeps at least one Ready
    # replica throughout the rollout — required for HA admission availability.
    maxUnavailable: 0
    # -- Max pods over `replicas` allowed during a rollout. 1 lets the new
    # ReplicaSet bring up one pod before the old one is removed.
    maxSurge: 1

# Fleet Management API credentials
# These can be provided via values or existingSecret
fleetManagement:
  # -- Fleet Management API base URL. Required unless `existingSecret` is set.
  # Example: `https://fleet-management-prod-us-central-0.grafana.net/pipeline.v1.PipelineService/`
  baseUrl: ""

  # -- Grafana Cloud Stack ID. Required unless `existingSecret` is set.
  username: ""

  # -- Grafana Cloud API token. Required unless `existingSecret` is set.
  password: ""

  # -- Use a pre-existing Secret for credentials instead of creating one. When set,
  # `baseUrl` / `username` / `password` are ignored.
  existingSecret: ""

  # -- Keys to read from `existingSecret`. Override only if your secret uses different keys.
  existingSecretKeys:
    baseUrl: base-url
    username: username
    password: password

  # Rate-limiter configuration.
  # apiRatePerSecond: match to your Fleet Management server-side api: rate
  # setting. Standard stacks default to 3; large or custom deployments may
  # allow more. Increase only if your Fleet Management stack is configured
  # with a higher limit — exceeding the server-side limit will produce 429s.
  # apiRateBurst: burst tokens available at startup/restart before the
  # sustained RPS ceiling applies. burst=1 causes livelock at scale (request
  # queue backs up until requests hit the 30s HTTP timeout).
  # -- Sustained Fleet Management API rate limit in requests per second. Match
  # this to your stack's server-side `api:` rate setting. Standard stacks: 3.
  apiRatePerSecond: 3
  # -- Token bucket size for the Fleet API rate limiter. Absorbs startup /
  # post-restart spikes without changing the sustained RPS ceiling. burst=1
  # causes livelock at scale (request queue backs up to the 30s HTTP timeout).
  apiRateBurst: 50

# Service Account configuration
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # automount: false — operator uses in-cluster kubeconfig via controller-runtime;
  # mounting the SA token unnecessarily expands the blast radius of a container compromise.
  automount: false
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# Pod annotations
podAnnotations: {}

# Pod labels
podLabels: {}

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  fsGroup: 65532     # align with container UID; ensures mounted Secrets are readable
  seccompProfile:
    type: RuntimeDefault

# Container security context
securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  runAsUser: 65532
  runAsGroup: 65532
  capabilities:
    drop:
    - "ALL"

# Resource limits and requests.
# Sizing guidance (informer cache + Pipeline cache + Go runtime headroom):
#   <1k CRs: limits.memory 512Mi
#   10k CRs: limits.memory 1Gi
#   30k+ CRs: limits.memory 2Gi (default below — covers the 30k tier with
#            burst headroom for restarts, GC pause spikes, and large
#            ListCollectors responses)
# requests.memory stays at 512Mi: steady-state working set after warm-up.
# -- Pod CPU/memory resource requests and limits. Defaults are tuned for the
# 30k-Collector tier; see the inline sizing comment above for smaller fleets.
resources:
  limits:
    cpu: 500m
    memory: 2Gi
  requests:
    cpu: 10m
    memory: 512Mi

# Logging configuration
logging:
  # Log level passed to --zap-log-level: debug, info, warn, error
  # Production default: info (JSON encoding, no stacktraces below error).
  # debug enables console encoding with stacktraces on warn+ — very verbose at 30k scale.
  level: info

# Termination grace period in seconds. Must exceed the Fleet API HTTP client timeout (30s)
# so in-flight API calls can complete before the pod is forcibly killed. Do not reduce below 30.
terminationGracePeriodSeconds: 30

# Leader election configuration
leaderElection:
  enabled: true
  # Lease duration
  leaseDuration: 15s
  # Renew deadline
  renewDeadline: 10s
  # Retry period
  retryPeriod: 2s

# Health probe configuration
healthProbe:
  # Port for health probes
  port: 8081
  # Liveness probe configuration
  liveness:
    # 45s accounts for informer cache warm-up at 30k Collectors (15-45s on a busy API server).
    # A shorter delay risks false crash-loops during normal startup.
    initialDelaySeconds: 45
    periodSeconds: 20
    timeoutSeconds: 1
    failureThreshold: 3
  # Readiness probe configuration
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 1
    failureThreshold: 3

# Metrics configuration
metrics:
  # Enable metrics endpoint
  enabled: true
  # Port for metrics
  port: 8080
  # secure: serve the metrics endpoint over HTTPS. Default false (HTTP) for easy
  # Prometheus scraping inside the cluster without TLS cert plumbing.
  # Set true only if you provide TLS certs for the metrics endpoint.
  secure: false
  # Service for metrics
  service:
    # Service type
    type: ClusterIP
    # Service port
    port: 8080
    # Service annotations
    annotations: {}
    # ServiceMonitor for Prometheus Operator
    serviceMonitor:
      enabled: false
      # Additional labels for ServiceMonitor
      additionalLabels: {}
      # Scrape interval
      interval: 30s
      # Scrape timeout
      scrapeTimeout: 10s

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity rules.
# When `replicaCount > 1` AND this is empty, the chart auto-injects a soft
# podAntiAffinity by `kubernetes.io/hostname` so replicas spread across nodes.
# Set explicitly here to override (e.g. for required hard anti-affinity, or to
# pin to specific zones / node groups).
# -- Pod affinity / anti-affinity rules. Empty default plus `replicaCount > 1`
# triggers an auto-injected soft hostname anti-affinity. Set non-empty to opt
# out of the auto-injected default.
affinity: {}
# Example explicit anti-affinity to spread replicas across nodes (for replicaCount > 1):
# affinity:
#   podAntiAffinity:
#     preferredDuringSchedulingIgnoredDuringExecution:
#     - weight: 100
#       podAffinityTerm:
#         labelSelector:
#           matchLabels:
#             app.kubernetes.io/name: fleet-management-operator
#         topologyKey: kubernetes.io/hostname

# Priority class name
priorityClassName: ""

# Pod disruption budget.
# The chart only renders the PDB when `enabled: true` AND `replicaCount > 1`.
# At replicaCount=1, a PDB with minAvailable=1 (or maxUnavailable=0) blocks
# node drains because there is no second pod to satisfy the budget. This guard
# is in the template (see poddisruptionbudget.yaml); flipping `enabled: true`
# at replicaCount=1 silently does nothing.
podDisruptionBudget:
  # -- Enable the PodDisruptionBudget. Only takes effect when `replicaCount > 1`.
  enabled: false
  # -- Minimum available replicas during voluntary disruption. For HA
  # (replicaCount > 1), prefer `maxUnavailable: 1` over `minAvailable` for
  # graceful rolling updates.
  minAvailable: 1
  # maxUnavailable: 1  # Recommended over minAvailable for graceful rolling updates

# RBAC configuration
rbac:
  # Specifies whether RBAC resources should be created
  create: true

# Webhook TLS configuration.
# See docs/webhook-setup.md for cert-manager, manual, and self-signed strategies.
# Default: controller-runtime auto-generates self-signed certs (dev/test only).
# Production: enable cert-manager or provide manual certs to avoid cert mismatch on restart.
webhook:
  # -- Port the webhook server listens on inside the pod. Wired into both the
  # `--webhook-port` flag and the Service `targetPort`.
  port: 9443
  certManager:
    # -- Use cert-manager to issue and rotate webhook TLS certs. Recommended
    # for HA (replicas > 1) — controller-runtime's in-memory self-signed
    # fallback regenerates per pod, breaking webhook calls under HA.
    # Requires cert-manager to be installed in the cluster.
    enabled: false
    # -- Reference to an existing cert-manager `Issuer` or `ClusterIssuer`.
    # Create the issuer before enabling.
    issuerRef:
      name: selfsigned-issuer
      kind: ClusterIssuer
  # -- Directory containing webhook TLS cert files (tls.crt, tls.key). When
  # set, passed as `--webhook-cert-path` to the manager AND requires
  # `webhook.certSecretName` so the chart can mount that Secret read-only at
  # this path. Leave empty to use controller-runtime's auto-generated
  # self-signed certs (dev/test only). Mutually exclusive with
  # `webhook.certManager.enabled` — the chart fails to render if both are set.
  certDir: ""
  # -- Name of a pre-existing Secret containing `tls.crt` and `tls.key` to
  # mount at `webhook.certDir`. Required when `webhook.certDir` is non-empty
  # and `webhook.certManager.enabled` is false. The Secret must already exist
  # in the release namespace; the chart does not create it.
  certSecretName: ""
  # -- Filename of the webhook TLS certificate inside `webhook.certDir` or
  # the cert-manager-mounted Secret. Override only when the issuer or
  # external Secret writes a non-default key name. Default `tls.crt`
  # matches cert-manager and standard Secret-as-volume conventions.
  certName: tls.crt
  # -- Filename of the webhook TLS private key inside `webhook.certDir` or
  # the cert-manager-mounted Secret. Override only when the issuer or
  # external Secret writes a non-default key name. Default `tls.key`
  # matches cert-manager and standard Secret-as-volume conventions.
  certKey: tls.key

# -- Enable HTTP/2 on the metrics and webhook servers. Default `false`
# mitigates the HTTP/2 Stream Cancellation (CVE GHSA-qppj-fm5r-hxr3) and
# Rapid Reset (CVE GHSA-4374-p667-p6c8) DoS classes — the K8s API server
# webhook client and standard Prometheus scrapers both speak HTTP/1.1, so
# disabling HTTP/2 has no practical impact for in-cluster traffic. Flip to
# `true` only if your scrape path or webhook caller mandates HTTP/2 (rare).
enableHTTP2: false

# Controllers and webhooks are individually opt-in. New controllers default to
# disabled so existing chart installs see no behavior change. Flip the
# matching key to true to enable that controller, its webhook, and its RBAC.
controllers:
  pipeline:
    # -- Enable the Pipeline reconciler and its admission webhook. The core controller; default on.
    enabled: true
  collector:
    # -- Enable the Collector reconciler and its admission webhook. Manages
    # remote attributes on a registered collector.
    enabled: false
  remoteAttributePolicy:
    # -- Enable the RemoteAttributePolicy reconciler and its admission webhook.
    # Bulk attribute assignment by selector across many Collectors.
    enabled: false
    # -- Max concurrent reconciles for RemoteAttributePolicy. Safe to increase:
    # reconciles are pure K8s cache reads with no Fleet API calls. Pipeline
    # and Collector always run at 1 because they share the Fleet API rate budget.
    maxConcurrent: 4
  externalAttributeSync:
    # -- Enable the ExternalAttributeSync reconciler and its admission webhook.
    # Pulls attributes from CMDB / SQL / HTTP sources on a schedule.
    enabled: false
    # -- Max concurrent reconciles for ExternalAttributeSync. Safe to increase:
    # Fetch calls are per-source.
    maxConcurrent: 4
    # -- Per-target rate limit (tokens/sec). Two syncs that resolve to the same
    # upstream share a token bucket so a restart wave cannot stampede a customer
    # source. 0 (default) disables per-target limiting. Set to 1 for one
    # fetch/sec/upstream — typically plenty since sync schedules run every
    # minute or longer.
    sourceTargetRate: 0
    # -- Token bucket size for the per-target limiter. Ignored when
    # `sourceTargetRate` is 0. Default 4 matches `maxConcurrent` so a single
    # concurrency generation passes through immediately, then refills at
    # `sourceTargetRate` per second.
    sourceTargetBurst: 4
  collectorDiscovery:
    # -- Enable the CollectorDiscovery reconciler and its admission webhook.
    # **REQUIRES `controllers.collector.enabled: true`.** The manager refuses
    # to start otherwise — discovery would create Collector CRs that no
    # controller acts on.
    enabled: false
    # -- Max concurrent reconciles for CollectorDiscovery. Keep at 1:
    # concurrency > 1 triggers multiple ListCollectors per poll cycle without
    # benefit.
    maxConcurrent: 1
  pipelineDiscovery:
    # -- Enable the PipelineDiscovery reconciler and its admission webhook.
    # Polls Fleet Management ListPipelines and creates Pipeline CRs for each
    # discovered pipeline.
    enabled: true
    # -- Max concurrent reconciles for PipelineDiscovery. Keep at 1:
    # concurrency > 1 triggers multiple ListPipelines calls per poll cycle
    # without benefit.
    maxConcurrent: 1
  tenantPolicy:
    # -- Enable TenantPolicy enforcement. When set, validating webhooks for
    # Pipeline / RemoteAttributePolicy / ExternalAttributeSync require K8s
    # subjects matched by a TenantPolicy CR to include at least one of the
    # policy's required matchers. Default-allow when no policy matches; the
    # CRD is always installed so policies can be authored ahead of enforcement.
    enabled: false

# Grafana dashboard ConfigMap. Picked up automatically by the Grafana sidecar
# (label grafana_dashboard: "1") or the Grafana Dashboard Operator.
grafana:
  dashboards:
    enabled: false

# Prometheus alert rules. Requires Prometheus Operator CRDs (PrometheusRule).
alerts:
  enabled: false
  # Labels added to the PrometheusRule resource for Prometheus Operator label selectors.
  # Example: prometheus: kube-prometheus
  labels: {}

# CRD lifecycle is governed by Helm 3 conventions, not chart values:
#   * On install/upgrade, every YAML in the chart's crds/ directory is applied
#     once. Helm does NOT re-apply or update CRDs on subsequent upgrades.
#   * On uninstall, Helm does NOT delete CRDs (intentional, to preserve user
#     CRs across reinstalls). To remove CRDs, run kubectl delete crd ... by
#     hand. See README "Uninstalling the Chart" for the exact commands.
# This chart therefore does not expose crds.install / crds.keep — they would
# have no effect.

