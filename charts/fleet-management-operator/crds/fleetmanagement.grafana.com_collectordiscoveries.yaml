---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  name: collectordiscoveries.fleetmanagement.grafana.com
spec:
  group: fleetmanagement.grafana.com
  names:
    kind: CollectorDiscovery
    listKind: CollectorDiscoveryList
    plural: collectordiscoveries
    shortNames:
    - fmcd
    singular: collectordiscovery
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.pollInterval
      name: Poll
      type: string
    - jsonPath: .status.collectorsObserved
      name: Observed
      type: integer
    - jsonPath: .status.collectorsManaged
      name: Managed
      type: integer
    - jsonPath: .status.lastSyncTime
      name: Last Sync
      type: date
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          CollectorDiscovery configures a periodic mirror of Fleet Management
          collectors into the cluster as Collector CRs. The Collector reconciler
          then manages remote attributes on each mirrored CR; this resource only
          owns the CR's existence (creation when a collector appears in Fleet,
          deletion or stale-marking when it disappears).
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state.
            properties:
              includeInactive:
                default: false
                description: |-
                  IncludeInactive mirrors Fleet records with markedInactiveAt set.
                  Default false skips them — the typical case is "show me only
                  collectors that are currently expected to ping in".
                type: boolean
              policy:
                description: Policy controls how the controller reacts to Fleet-side
                  changes.
                properties:
                  onCollectorRemoved:
                    default: Keep
                    description: |-
                      OnCollectorRemoved chooses the controller's response when a
                      previously-discovered collector no longer appears in
                      ListCollectors.
                    enum:
                    - Keep
                    - Delete
                    type: string
                  onConflict:
                    default: Skip
                    description: |-
                      OnConflict chooses the controller's response when a Collector CR
                      with the desired name already exists and is not labeled as
                      managed by this discovery. v1 only ships Skip.
                    enum:
                    - Skip
                    type: string
                type: object
              pollInterval:
                default: 5m
                description: |-
                  PollInterval is how often the controller calls Fleet's
                  ListCollectors. Webhook-enforced minimum is 1 minute to protect
                  the shared 3 req/s rate limiter.
                type: string
              selector:
                description: |-
                  Selector is the server-side filter passed to ListCollectors.
                  Reuses the PolicySelector shape: matchers AND'd, OR'd with
                  explicit collectorIDs. An empty selector means "match every
                  collector" (server-wide ListCollectors call) — accepted but
                  expensive on large fleets.
                properties:
                  collectorIDs:
                    description: |-
                      CollectorIDs is an explicit list of collector IDs this policy targets.
                      OR'd with Matchers — a Collector matches if its ID appears here, even
                      if the Matchers would otherwise reject it.
                    items:
                      type: string
                    maxItems: 1000
                    type: array
                  matchers:
                    description: |-
                      Matchers in Prometheus Alertmanager syntax (=, !=, =~, !~), evaluated
                      against the matched Collector's local attributes plus its ID under
                      the synthetic key "collector.id". A maximum of 100 matchers may be
                      set per selector; the cap exists to bound validation cost and keep
                      `kubectl describe` output readable. Each matcher is independently
                      capped at 200 characters by the API server (OpenAPI maxLength) and
                      double-checked by the validating webhook.
                    items:
                      maxLength: 200
                      type: string
                    maxItems: 100
                    type: array
                type: object
              targetNamespace:
                description: |-
                  TargetNamespace is the namespace where mirrored Collector CRs are
                  created. Defaults to this CollectorDiscovery's own namespace.
                type: string
            type: object
          status:
            description: status defines the observed state.
            properties:
              collectorsManaged:
                description: |-
                  CollectorsManaged is the count of Collector CRs in the target
                  namespace currently labeled as managed by this discovery.
                format: int32
                type: integer
              collectorsObserved:
                description: |-
                  CollectorsObserved is the count of collectors returned by the
                  last ListCollectors call (after include-inactive filtering).
                format: int32
                type: integer
              conditions:
                description: |-
                  Conditions represent the current state of the CollectorDiscovery.
                  Known types: Ready, Synced. Reasons: Synced, ListCollectorsFailed,
                  UpsertFailed, InvalidConfig. See docs/conditions.md for the
                  cross-CRD registry.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              conflicts:
                description: |-
                  Conflicts records the most recent cases (up to 100) where the
                  controller could not create or claim a CR due to a name/ownership
                  conflict. When the cap is hit, a TruncatedConflicts condition is
                  set; check events for the full conflict list.
                items:
                  description: |-
                    DiscoveryConflict records a single conflict between the desired CR
                    and an existing one with the same name.
                  properties:
                    collectorID:
                      description: |-
                        CollectorID is the Fleet collector ID whose mirror CR could not
                        be created. Used as the list-map key.
                      type: string
                    crName:
                      description: CRName is the metadata.name the controller computed
                        for the CR.
                      type: string
                    reason:
                      description: Reason classifies the conflict.
                      enum:
                      - NotOwnedByDiscovery
                      - OwnedByOtherDiscovery
                      - NameSanitizationFailed
                      type: string
                  required:
                  - collectorID
                  - crName
                  - reason
                  type: object
                maxItems: 100
                type: array
                x-kubernetes-list-map-keys:
                - collectorID
                x-kubernetes-list-type: map
              lastSuccessTime:
                description: |-
                  LastSuccessTime is the timestamp of the most recent
                  ListCollectors call that produced a status update without error.
                format: date-time
                type: string
              lastSyncTime:
                description: |-
                  LastSyncTime is the timestamp of the most recent ListCollectors
                  call (success or failure).
                format: date-time
                type: string
              observedGeneration:
                description: ObservedGeneration reflects the most recently observed
                  spec.
                format: int64
                type: integer
              staleCollectors:
                description: |-
                  StaleCollectors lists collector IDs whose CR still exists but no
                  longer appears in ListCollectors. Only populated when
                  policy.onCollectorRemoved=Keep.
                items:
                  type: string
                type: array
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
