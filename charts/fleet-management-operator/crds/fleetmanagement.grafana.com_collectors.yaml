---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  name: collectors.fleetmanagement.grafana.com
spec:
  group: fleetmanagement.grafana.com
  names:
    kind: Collector
    listKind: CollectorList
    plural: collectors
    shortNames:
    - fmcol
    singular: collector
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.id
      name: ID
      type: string
    - jsonPath: .status.collectorType
      name: Type
      type: string
    - jsonPath: .status.registered
      name: Registered
      type: boolean
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Collector is the Schema for the collectors API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of the Collector.
            properties:
              enabled:
                description: |-
                  Enabled toggles the collector in Fleet Management. nil leaves the
                  existing server-side value untouched (so that the operator does not
                  fight a value set elsewhere unless the user explicitly wants to).
                type: boolean
              id:
                description: |-
                  ID is the Fleet Management collector ID. Required and immutable after
                  creation (enforced by the webhook).
                minLength: 1
                type: string
              name:
                description: |-
                  Name is the optional display name set on the collector in Fleet
                  Management. If empty, the existing server-side name is preserved.
                type: string
              remoteAttributes:
                additionalProperties:
                  type: string
                description: |-
                  RemoteAttributes managed by this CR. Keys with prefix "collector." are
                  reserved by Fleet Management and rejected by the webhook. Removing a
                  key from this map removes it from Fleet (delete-detected via
                  status.attributeOwners).
                maxProperties: 100
                type: object
            required:
            - id
            type: object
          status:
            description: status defines the observed state of the Collector.
            properties:
              attributeOwners:
                description: |-
                  AttributeOwners records which CR owns each remote-attribute key. Used
                  by the controller to detect and remove keys when their owner stops
                  claiming them.
                items:
                  description: |-
                    AttributeOwnership records the owner and current value of one remote
                    attribute key.
                  properties:
                    key:
                      description: Key is the remote-attribute key.
                      type: string
                    ownerKind:
                      description: OwnerKind identifies which kind of CR owns this
                        key.
                      enum:
                      - Collector
                      - RemoteAttributePolicy
                      - ExternalAttributeSync
                      type: string
                    ownerName:
                      description: |-
                        OwnerName is the namespaced name of the owning CR (in the form
                        "namespace/name").
                      type: string
                    value:
                      description: Value is the value last written for this key.
                      type: string
                  required:
                  - key
                  - ownerKind
                  - ownerName
                  - value
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - key
                x-kubernetes-list-type: map
              collectorType:
                description: CollectorType is the type the collector reported on registration.
                enum:
                - Alloy
                - OpenTelemetryCollector
                - Unspecified
                type: string
              conditions:
                description: |-
                  Conditions represent the current state of the Collector resource.

                  Standard condition types:
                  - "Ready": Collector successfully reconciled (attributes synced, status mirrored).
                  - "Synced": Last reconciliation succeeded.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              effectiveRemoteAttributes:
                additionalProperties:
                  type: string
                description: |-
                  EffectiveRemoteAttributes is the merged set of remote attributes last
                  successfully written to Fleet Management for this collector. In Phase
                  1 this is exactly spec.remoteAttributes; later phases add policy and
                  external-sync layers.
                type: object
              lastPing:
                description: |-
                  LastPing is the most recent ping timestamp as reported by Fleet
                  Management. May lag relative to actual collector activity.
                format: date-time
                type: string
              localAttributes:
                additionalProperties:
                  type: string
                description: |-
                  LocalAttributes are the attributes the collector reports about itself
                  (e.g. collector.os=linux). Read-only — set by the collector, not the
                  operator.
                type: object
              observedGeneration:
                description: |-
                  ObservedGeneration reflects the generation of the most recently
                  observed Collector spec.
                format: int64
                type: integer
              registered:
                description: |-
                  Registered is true if the collector has been observed in Fleet
                  Management (i.e. it has called RegisterCollector at least once).
                type: boolean
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
