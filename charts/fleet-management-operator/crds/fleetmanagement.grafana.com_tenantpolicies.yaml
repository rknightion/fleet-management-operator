---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  name: tenantpolicies.fleetmanagement.grafana.com
spec:
  group: fleetmanagement.grafana.com
  names:
    kind: TenantPolicy
    listKind: TenantPolicyList
    plural: tenantpolicies
    shortNames:
    - fmtp
    singular: tenantpolicy
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.boundSubjectCount
      name: Subjects
      type: integer
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          TenantPolicy declares which K8s subjects are required to scope their
          Fleet Management CR matchers to a specific set of allowed matchers. It
          implements the missing per-tenant authorization layer that Fleet
          Management's API does not provide natively, by leveraging K8s RBAC group
          membership at admission time. Cluster-scoped because tenant boundaries
          are a platform-admin concern; standard K8s RBAC on this CRD itself
          controls who can create or modify policies.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired tenant policy.
            properties:
              namespaceSelector:
                description: |-
                  NamespaceSelector limits this policy to CRs in matching namespaces. If
                  nil, the policy applies in every namespace. Selectors are evaluated
                  against namespace labels via the standard metav1.LabelSelector
                  semantics.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              requiredMatchers:
                description: |-
                  RequiredMatchers is the set of matchers (Prometheus Alertmanager
                  syntax: key=value, key!=value, key=~regex, key!~regex) that the CR's
                  matcher set must contain at least one of. Multiple matching policies
                  contribute to the union of allowed matchers — the CR satisfies the
                  check by including ANY one element of that union. A maximum of 100
                  required matchers may be set per policy; the cap exists to bound
                  admission cost across many concurrent CR writes. Each matcher is
                  independently capped at 200 characters by the API server (OpenAPI
                  maxLength) and double-checked by the validating webhook.
                items:
                  maxLength: 200
                  type: string
                maxItems: 100
                minItems: 1
                type: array
              subjects:
                description: |-
                  Subjects this policy applies to. A subject matches the admission
                  request when its Kind+Name (and Namespace, for ServiceAccount) line up
                  with admission.Request.UserInfo. Reuses rbacv1.Subject so cluster
                  admins can copy bindings from existing RoleBindings.
                items:
                  description: |-
                    Subject contains a reference to the object or user identities a role binding applies to.  This can either hold a direct API object reference,
                    or a value for non-objects such as user and group names.
                  properties:
                    apiGroup:
                      description: |-
                        APIGroup holds the API group of the referenced subject.
                        Defaults to "" for ServiceAccount subjects.
                        Defaults to "rbac.authorization.k8s.io" for User and Group subjects.
                      type: string
                    kind:
                      description: |-
                        Kind of object being referenced. Values defined by this API group are "User", "Group", and "ServiceAccount".
                        If the Authorizer does not recognized the kind value, the Authorizer should report an error.
                      type: string
                    name:
                      description: Name of the object being referenced.
                      type: string
                    namespace:
                      description: |-
                        Namespace of the referenced object.  If the object kind is non-namespace, such as "User" or "Group", and this value is not empty
                        the Authorizer should report an error.
                      type: string
                  required:
                  - kind
                  - name
                  type: object
                  x-kubernetes-map-type: atomic
                minItems: 1
                type: array
            required:
            - requiredMatchers
            - subjects
            type: object
          status:
            description: status defines the observed state of the policy.
            properties:
              boundSubjectCount:
                description: |-
                  BoundSubjectCount is the number of subjects (groups + users +
                  service accounts) currently declared by spec.subjects. Maintained
                  alongside the array so a typed printer column does not need to
                  coerce a slice into an integer.
                format: int32
                type: integer
              conditions:
                description: Conditions describe the policy's current state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: ObservedGeneration tracks the last spec generation reconciled.
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
