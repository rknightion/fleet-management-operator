---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  name: pipelinediscoveries.fleetmanagement.grafana.com
spec:
  group: fleetmanagement.grafana.com
  names:
    kind: PipelineDiscovery
    listKind: PipelineDiscoveryList
    plural: pipelinediscoveries
    shortNames:
    - fmpd
    singular: pipelinediscovery
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.pollInterval
      name: Poll
      type: string
    - jsonPath: .spec.importMode
      name: Mode
      type: string
    - jsonPath: .status.pipelinesObserved
      name: Observed
      type: integer
    - jsonPath: .status.pipelinesManaged
      name: Managed
      type: integer
    - jsonPath: .status.lastSyncTime
      name: Last Sync
      type: date
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          PipelineDiscovery configures a periodic import of Fleet Management pipelines
          into the cluster as Pipeline CRs.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state.
            properties:
              importMode:
                default: Adopt
                description: |-
                  ImportMode controls whether discovered Pipeline CRs are immediately
                  managed (Adopt) or held read-only (ReadOnly). Individual Pipeline CRs
                  can override this via the fleetmanagement.grafana.com/import-mode=adopt
                  annotation.
                enum:
                - Adopt
                - ReadOnly
                type: string
              policy:
                description: Policy controls lifecycle decisions.
                properties:
                  onPipelineRemoved:
                    default: Keep
                    description: |-
                      OnPipelineRemoved chooses the response when a previously-discovered
                      pipeline no longer appears in ListPipelines.
                    enum:
                    - Keep
                    - Delete
                    type: string
                type: object
              pollInterval:
                default: 5m
                description: |-
                  PollInterval is how often the controller calls ListPipelines.
                  Webhook-enforced minimum is 1 minute to protect the shared rate limiter.
                type: string
              selector:
                description: |-
                  Selector filters which Fleet pipelines are imported.
                  An empty selector means "import every pipeline" (server-wide
                  ListPipelines call) — accepted but expensive on large fleets.
                properties:
                  configType:
                    description: ConfigType limits discovery to pipelines of this
                      type.
                    enum:
                    - Alloy
                    - OpenTelemetryCollector
                    type: string
                  enabled:
                    description: |-
                      Enabled limits discovery to enabled or disabled pipelines.
                      Omit to discover both.
                    type: boolean
                type: object
              targetNamespace:
                description: |-
                  TargetNamespace is the namespace where discovered Pipeline CRs are created.
                  Defaults to this PipelineDiscovery's own namespace.
                type: string
            type: object
          status:
            description: status defines the observed state.
            properties:
              conditions:
                description: Conditions represent the current state of the PipelineDiscovery.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              conflicts:
                description: |-
                  Conflicts records cases (up to 100) where a CR could not be created
                  due to a name/ownership conflict. When the cap is hit, a TruncatedConflicts
                  condition is set; check events for the full list.
                items:
                  description: |-
                    PipelineDiscoveryConflict records a single conflict between the desired CR
                    and an existing one with the same name.
                  properties:
                    crName:
                      description: CRName is the metadata.name the controller computed.
                      type: string
                    pipelineID:
                      description: PipelineID is the Fleet pipeline ID that could
                        not be mirrored. List-map key.
                      type: string
                    reason:
                      description: Reason classifies the conflict.
                      enum:
                      - NotOwnedByDiscovery
                      - OwnedByOtherDiscovery
                      - NameSanitizationFailed
                      type: string
                  required:
                  - crName
                  - pipelineID
                  - reason
                  type: object
                maxItems: 100
                type: array
                x-kubernetes-list-map-keys:
                - pipelineID
                x-kubernetes-list-type: map
              lastSuccessTime:
                description: LastSuccessTime is the timestamp of the most recent successful
                  poll.
                format: date-time
                type: string
              lastSyncTime:
                description: LastSyncTime is the timestamp of the most recent ListPipelines
                  call.
                format: date-time
                type: string
              observedGeneration:
                description: ObservedGeneration reflects the most recently observed
                  spec generation.
                format: int64
                type: integer
              pipelinesManaged:
                description: |-
                  PipelinesManaged is the count of Pipeline CRs labeled as managed by
                  this discovery.
                format: int32
                type: integer
              pipelinesObserved:
                description: PipelinesObserved is the count returned by the last ListPipelines
                  call.
                format: int32
                type: integer
              stalePipelines:
                description: |-
                  StalePipelines lists pipeline IDs whose CR still exists but no longer
                  appears in ListPipelines. Only populated when policy.onPipelineRemoved=Keep.
                items:
                  type: string
                type: array
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
