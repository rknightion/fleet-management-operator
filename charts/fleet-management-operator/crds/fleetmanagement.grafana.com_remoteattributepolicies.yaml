---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  name: remoteattributepolicies.fleetmanagement.grafana.com
spec:
  group: fleetmanagement.grafana.com
  names:
    kind: RemoteAttributePolicy
    listKind: RemoteAttributePolicyList
    plural: remoteattributepolicies
    shortNames:
    - fmrap
    singular: remoteattributepolicy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.priority
      name: Priority
      type: integer
    - jsonPath: .status.matchedCount
      name: Matched
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          RemoteAttributePolicy applies a bulk set of remote attributes to every
          Collector matched by its selector.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of the Policy.
            properties:
              attributes:
                additionalProperties:
                  type: string
                description: |-
                  Attributes applied to every matched collector. Reserved-prefix keys
                  ("collector.") are rejected by the API server (CEL) and the
                  validating webhook.
                maxProperties: 100
                minProperties: 1
                type: object
                x-kubernetes-validations:
                - message: keys must not be empty
                  rule: self.all(k, k.size() > 0)
                - message: keys must not use the reserved 'collector.' prefix
                  rule: self.all(k, !k.startsWith('collector.'))
                - message: values must be 1024 characters or fewer
                  rule: self.all(k, self[k].size() <= 1024)
              priority:
                default: 0
                description: |-
                  Priority breaks ties when multiple policies match the same collector
                  and set the same key — higher Priority wins. Equal-priority ties are
                  broken alphabetically by namespaced name to keep behavior
                  deterministic across reconciliations.
                format: int32
                type: integer
              selector:
                description: |-
                  PolicySelector picks the Collectors a RemoteAttributePolicy applies to.

                  A Collector matches the selector if it satisfies all Matchers (AND-ed
                  together) OR its ID appears in CollectorIDs. An empty selector matches
                  nothing — this is intentional defensive behavior so a partially-written
                  Policy never accidentally targets every collector.
                properties:
                  collectorIDs:
                    description: |-
                      CollectorIDs is an explicit list of collector IDs this policy targets.
                      OR'd with Matchers — a Collector matches if its ID appears here, even
                      if the Matchers would otherwise reject it.
                    items:
                      minLength: 1
                      type: string
                    maxItems: 1000
                    type: array
                  matchers:
                    description: |-
                      Matchers in Prometheus Alertmanager syntax (=, !=, =~, !~), evaluated
                      against the matched Collector's local attributes plus its ID under
                      the synthetic key "collector.id". A maximum of 100 matchers may be
                      set per selector; the cap exists to bound validation cost and keep
                      `kubectl describe` output readable. Each matcher is independently
                      capped at 200 characters by the API server (OpenAPI maxLength) and
                      double-checked by the validating webhook.
                    items:
                      maxLength: 200
                      minLength: 1
                      type: string
                    maxItems: 100
                    type: array
                type: object
                x-kubernetes-validations:
                - message: selector must specify at least one matcher or collectorID
                  rule: (has(self.matchers) && self.matchers.size() > 0) || (has(self.collectorIDs)
                    && self.collectorIDs.size() > 0)
            required:
            - attributes
            - selector
            type: object
          status:
            description: status defines the observed state of the Policy.
            properties:
              conditions:
                description: |-
                  Conditions represent the current state of the Policy.
                  See docs/conditions.md for the cross-CRD condition registry.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              matchedCollectorIDs:
                description: |-
                  MatchedCollectorIDs is a capped sample (up to 1000) of the sorted
                  collector IDs currently matched by this policy's selector. For the
                  authoritative count, see MatchedCount. When the cap is hit, a
                  Truncated condition is set on the status.
                items:
                  type: string
                maxItems: 1000
                type: array
              matchedCount:
                description: |-
                  MatchedCount is the number of collectors currently matched by this
                  policy. Maintained alongside MatchedCollectorIDs to back a typed
                  printer column without requiring kubectl to coerce a string array
                  into an integer.
                format: int32
                type: integer
              observedGeneration:
                description: |-
                  ObservedGeneration reflects the generation of the most recently
                  observed Policy spec.
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
