apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-fleet-api
  labels:
    app: mock-fleet-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-fleet-api
  template:
    metadata:
      labels:
        app: mock-fleet-api
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: mock-api
        image: mock-fleet-api:test
        imagePullPolicy: Never
        env:
        - name: PORT
          value: "8443"
        - name: TLS_CERT_FILE
          value: /tls/tls.crt
        - name: TLS_KEY_FILE
          value: /tls/tls.key
        ports:
        - containerPort: 8443
          name: https
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8443
            scheme: HTTPS
          initialDelaySeconds: 5
          periodSeconds: 10
        volumeMounts:
        - mountPath: /tls
          name: mock-fleet-api-tls
          readOnly: true
        securityContext:
          runAsNonRoot: true
          runAsUser: 65532
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - "ALL"
      volumes:
      - name: mock-fleet-api-tls
        secret:
          secretName: mock-fleet-api-tls
