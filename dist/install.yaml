  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fleet-management-operator
      control-plane: operator
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        app.kubernetes.io/name: fleet-management-operator
        control-plane: operator
    spec:
      containers:
      - args:
        - --metrics-bind-address=:8080
        - --metrics-secure=false
        - --leader-elect
        - --health-probe-bind-address=:8081
        - --enable-collector-controller=true
        - --enable-policy-controller=true
        - --enable-external-sync-controller=true
        - --enable-collector-discovery-controller=true
        - --enable-pipeline-discovery-controller=true
        command:
        - /manager
        env:
        - name: FLEET_MANAGEMENT_BASE_URL
          valueFrom:
            secretKeyRef:
              key: base-url
              name: fleet-management-credentials
        - name: FLEET_MANAGEMENT_USERNAME
          valueFrom:
            secretKeyRef:
              key: username
              name: fleet-management-credentials
        - name: FLEET_MANAGEMENT_PASSWORD
          valueFrom:
            secretKeyRef:
              key: password
              name: fleet-management-credentials
        image: ghcr.io/rknightion/fleet-management-operator:dev
        imagePullPolicy: IfNotPresent
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        ports: []
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        volumeMounts: []
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: fleet-management-operator
      terminationGracePeriodSeconds: 10
      volumes: []
